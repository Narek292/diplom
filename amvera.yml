meta:
  environment: python
  toolchain:
    name: pip
    version: 3.12  # Укажите вашу версию Python, если необходимо

build:
  requirementsPath: requirements.txt

run:
  persistence:
    - mountPath: /data
      name: sqlite-db
  command: python manage.py migrate && python manage.py collectstatic --noinput && gunicorn devicemanage.wsgi:application --bind 0.0.0.0:80