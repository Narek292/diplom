{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="{% static 'main/css/bootstrap.min.css' %}">
    <style>
        body {
            background-color: #f5f6fa;
        }

        .login-container {
            min-height: 100vh;
        }
    </style>
</head>
<body>
<div class="container login-container d-flex justify-content-center align-items-center">
    <div class="card shadow" style="width: 400px;">
        <div class="card-body">
            <h4 class="text-center mb-4">Авторизация</h4>
            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Логин</label>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>
                </div>
                <div class="d-grid" style="text-align: center;">
                    <p><a class="link-opacity-75" href="{% url 'register' %}">Нет аккаунта? Зарегистрироваться</a></p>
                    <p><a class="link-opacity-75" href="{% url 'wiki' %}">Продолжить как гость</a></p>
                    <button type="submit" class="btn btn-primary">
                        Войти
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
