{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="{% static 'main/css/bootstrap.min.css' %}">
    <style>
        body {
            background-color: #f5f6fa;
        }
        .register-container {
            min-height: 100vh;
        }
    </style>
</head>
<body>
<div class="container register-container d-flex justify-content-center align-items-center">
    <div class="card shadow" style="width: 450px;">
        <div class="card-body">
            <h4 class="text-center mb-4">Регистрация</h4>
            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Логин</label>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required
                    >
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Подтвердите пароль</label>
                    <input
                        type="password"
                        name="password2"
                        class="form-control"
                        required>
                </div>
                <div class="d-grid mb-2">
                    <button type="submit" class="btn btn-success">
                        Зарегистрироваться
                    </button>
                </div>
                <div class="text-center">
                    Уже есть аккаунт?
                    <a href="{% url 'login' %}">Войти</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
